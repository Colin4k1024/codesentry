id: SWIFT_SENSITIVE_LOG
name: Sensitive Data Logging
description: Detects sensitive data in print or os_log statements
severity: SEVERE
category: security
languages:
  - swift
suggestion: Remove sensitive fields from log statements
patterns:
  - type: regex
    pattern: '(?i)(print|os_log|NSLog|debugPrint)\([^)]*(password|token|secret|key)'
    comment: Possible sensitive data in log

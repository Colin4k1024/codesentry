id: SWIFT_HARDCODED_SECRET
name: Hardcoded Secret
description: Detects hardcoded passwords, tokens, API keys in Swift
severity: SEVERE
category: security
languages:
  - swift
suggestion: Use Keychain or environment variables
patterns:
  - type: regex
    pattern: '(?i)(password|token|api_key|secret|apiKey)\s*[=:]\s*["\x27][^"\x27]{8,}["\x27]'
    comment: Possible hardcoded secret
  - type: regex
    pattern: 'let\s+\w+\s*=\s*["\x27][a-zA-Z0-9_\-]{20,}["\x27]'
    comment: Possible hardcoded secret (long string constant)

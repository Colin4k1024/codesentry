id: KOTLIN_COMMAND_INJECTION
name: Command Injection
description: Detects use of Runtime.exec or ProcessBuilder with user input that could allow command injection
severity: SEVERE
category: security
languages: [kotlin]
suggestion: Avoid Runtime.exec with string concatenation, use ProcessBuilder with argument list
patterns:
  - type: regex
    pattern: 'exec\s*\([^)]+\s*\+'
    comment: exec with string concatenation
  - type: regex
    pattern: 'system\s*\([^)]+\s*\+'
    comment: system() with string concatenation

id: KT_HARDCODED_SECRET
name: Hardcoded Secret
description: Detects hardcoded passwords, tokens, API keys in Kotlin
severity: SEVERE
category: security
languages:
  - kotlin
suggestion: Use environment variables or a secrets manager
patterns:
  - type: regex
    pattern: '(?i)(password|token|api_key|secret|apiKey|secretKey)\s*[=:]\s*["\x27][^"\x27]{8,}["\x27]'
    comment: Possible hardcoded secret
  - type: regex
    pattern: '"[a-zA-Z0-9_\-]{20,}"'
    comment: Possible hardcoded secret (long string literal)

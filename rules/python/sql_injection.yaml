id: PY_SQL_INJECTION
name: SQL Injection
description: Detects string concatenation in SQL queries in Python
severity: SEVERE
category: security
languages:
  - python
suggestion: Use parameterized queries instead of string formatting
patterns:
  - type: regex
    pattern: '(?i)(execute|executemany|cursor\.execute)\s*\([^)]*(\+|%|\.format\()[^)]*\)'
    comment: String concatenation or formatting in SQL query - use parameterized queries
  - type: regex
    pattern: '(?i)f["\x27].*\{.*\}.*SELECT'
    comment: f-string with SQL keyword - verify values are sanitized
  - type: regex
    pattern: '(?i)execute\s*\([^)]*SELECT[^)]*\+[^)]*\)'
    comment: SELECT with string concatenation in execute call

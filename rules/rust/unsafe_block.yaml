id: RUST_UNSAFE_BLOCK
name: Unsafe Block Usage
description: Detects use of unsafe blocks in Rust code that bypasses memory safety guarantees
severity: WARNING
category: security
languages: [rust]
suggestion: Ensure unsafe blocks are minimized and thoroughly documented with safety comments
patterns:
  - type: regex
    pattern: 'unsafe\s*\{'
    comment: Unsafe block detected - ensure memory safety
  - type: regex
    pattern: 'unsafe\s+fn\s+'
    comment: Unsafe function - document safety invariants
  - type: regex
    pattern: 'unsafe\s+impl\s+'
    comment: Unsafe impl - ensure trait safety

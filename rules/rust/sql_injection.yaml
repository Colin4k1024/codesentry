id: RS_SQL_INJECTION
name: SQL Injection
description: Detects string concatenation in SQL queries in Rust
severity: SEVERE
category: security
languages:
  - rust
suggestion: Use parameterized queries
patterns:
  - type: regex
    pattern: '(?i)(query|execute|run)\s*\([^)]*(\+|&|\||%).*SELECT'
    comment: SQL query with string concatenation or formatting
  - type: regex
    pattern: 'format!\s*\([^)]*SELECT.*\{.*\}.*\)'
    comment: format! macro with SELECT and string interpolation

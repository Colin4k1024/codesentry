id: RS_HARDCODED_SECRET
name: Hardcoded Secret
description: Detects hardcoded passwords, tokens, API keys in Rust
severity: SEVERE
category: security
languages:
  - rust
suggestion: Use environment variables or a secrets manager
patterns:
  - type: regex
    pattern: '(?i)(password|token|api_key|secret|apiKey|secret_key)\s*[=:]\s*["\x27][^"\x27]{8,}["\x27]'
    comment: Possible hardcoded secret
  - type: regex
    pattern: 'env!\s*\(\s*["\x27]\w+["\x27]\s*\)'
    comment: Hardcoded env! macro value

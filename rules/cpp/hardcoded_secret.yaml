id: CPP_HARDCODED_SECRET
name: Hardcoded Secret
description: Detects hardcoded passwords, tokens, API keys in C++
severity: SEVERE
category: security
languages:
  - cpp
suggestion: Use environment variables or a secrets manager
patterns:
  - type: regex
    pattern: '(?i)(password|token|api_key|secret)\s*[=:]\s*["\x27"][^"\x27]{8,}["\x27]'
    comment: Possible hardcoded secret
  - type: regex
    pattern: '"[a-zA-Z0-9_\-]{20,}"'
    comment: Possible hardcoded secret (long string literal)

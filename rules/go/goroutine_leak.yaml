id: GOROUTINE_LEAK
name: Goroutine Leak
description: Detects goroutines started without proper lifecycle management
severity: WARNING
category: performance
languages: [go]
suggestion: Use errgroup or context to manage goroutine lifecycle
patterns:
  - type: regex
    pattern: 'go\s+func\s*\('
    comment: Goroutine without lifecycle management
  - type: ast
    language: go
    query: '(*ast.GoStmt).Go' 

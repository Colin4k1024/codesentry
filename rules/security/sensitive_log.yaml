id: SENSITIVE_LOG
name: Sensitive Data Logging
description: Detects logging of sensitive data
severity: SEVERE
category: security
languages: [go, javascript, python]
suggestion: Remove sensitive fields from log statements
patterns:
  - type: regex
    pattern: '(log\.|console\.|fmt\.Print|print\()(.)*\b(password|token|secret)\b'
    comment: Possible sensitive data in log
  - type: regex
    pattern: '(log\.|console\.|fmt\.Print|print\()(.)*\b(api[_\s]?key|secret[_\s]?key|access[_\s]?token|bearer[_\s]?token)\b'
    comment: Possible API key or token in log

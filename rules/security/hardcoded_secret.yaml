id: HARDCODED_SECRET
name: Hardcoded Secret
description: Detects hardcoded passwords, tokens, API keys
severity: SEVERE
category: security
languages:
  - go
  - javascript
  - python
suggestion: Use environment variables or a secrets manager
patterns:
  - type: regex
    pattern: '(?i)(password|token|api_key|secret|apiKey|secretKey)\s*(:?=)\s*"[^"\s][^"]{7,}"'
    comment: Possible hardcoded secret

id: TS_SQL_INJECTION
name: SQL Injection
description: Detects string concatenation in SQL queries
severity: SEVERE
category: security
languages:
  - typescript
  - javascript
suggestion: Use parameterized queries or an ORM
patterns:
  - type: regex
    pattern: "(?i)(query|execute|run)\\s*\\([^)]*(\"|').*SELECT.*(\"|')\\s*\\+"
    comment: SQL query with string concatenation - potential injection
  - type: regex
    pattern: "(?i)(\"|').*(SELECT|INSERT|UPDATE|DELETE).*(\"|')\\s*\\+"
    comment: SQL keyword string concatenated with variable - potential injection
  - type: regex
    pattern: '(?i)(SELECT|INSERT|UPDATE|DELETE|FROM|WHERE|ORDER|GROUP|HAVING|LIMIT|JOIN)\s*`[^`]*\$\{[^}]*\+[^}]*\}[^`]*`'
    comment: String concatenation in template literal SQL query
  - type: regex
    pattern: 'template\s+`[^`]*SELECT[^`]*\$\{.*\}.*`'
    comment: Template literal with SELECT and interpolation

id: TS_HARDCODED_SECRET
name: Hardcoded Secret
description: Detects hardcoded passwords, tokens, API keys in TypeScript/JavaScript
severity: SEVERE
category: security
languages:
  - typescript
  - javascript
suggestion: Use environment variables or a secrets manager
patterns:
  - type: regex
    pattern: "(?i)(password|token|api_key|secret|apiKey|secretKey)\\s*[=:]\\s*[\"\\x27`][^\"\\x27`]{8,}[\"\\x27`]"
    comment: Possible hardcoded secret
  - type: regex
    pattern: "(?i)const\\s+\\w+\\s*=\\s*[\"\\x27][a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}[\"\\x27]"
    comment: Possible hardcoded secret (UUID constant)
  - type: regex
    pattern: "(?i)const\\s+\\w+\\s*=\\s*[\"\\x27][a-f0-9]{32,}[\"\\x27]"
    comment: Possible hardcoded secret (long hex constant)
  - type: regex
    pattern: "(?i)const\\s+\\w+\\s*=\\s*[\"\\x27][A-Za-z0-9_+/=]{40,}[\"\\x27]"
    comment: Possible hardcoded secret (long base64-like constant)

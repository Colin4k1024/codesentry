id: TS_REGEX_DOS
name: Regex Denial of Service
description: Detects potentially vulnerable regex patterns that could cause catastrophic backtracking
severity: WARNING
category: security
languages: [typescript, javascript]
suggestion: Use atomic groups, possessive quantifiers, or simplify regex patterns to prevent ReDoS attacks
patterns:
  - type: regex
    # Match nested quantifiers inside regex literals - patterns like (.*+)+, (.++)+, (.+*)+, (.*.*)+
    # Only matches inside /.../ regex literals to avoid false positives on array indexing like str[0]
    pattern: '/[^/]*\(\.[*+]+\)[*+]+/'
    comment: Nested quantifiers inside regex literal - catastrophic backtracking risk
  - type: regex
    # Match nested quantifiers with alternation inside regex literals
    pattern: '/[^/]*\(\.[^)]+\)[*+]+/'
    comment: Nested quantifiers inside regex literal - catastrophic backtracking risk
  - type: regex
    # Match alternation with 3+ pipes inside regex literals (not logical OR operators)
    # Requires being inside a regex literal context (preceded by / and followed by /)
    pattern: '/[^/]*\|[^|]+\|[^|]+\|[^/]+/'
    comment: Alternation with 3+ pipes inside regex literal - use atomic groups or simplify to prevent ReDoS

id: PHP_HARDCODED_SECRET
name: Hardcoded Secret
description: Detects hardcoded passwords, tokens, API keys in PHP
severity: SEVERE
category: security
languages:
  - php
suggestion: Use environment variables or a secrets manager
patterns:
  - type: regex
    pattern: '(?i)(password|token|api_key|secret|apiKey)\s*[=:]\s*["\x27$][^"\x27$]{8,}["\x27]'
    comment: Possible hardcoded secret
  - type: regex
    pattern: '\$config\s*\[\s*["\x27][^"\x27]+["\x27]\s*\]\s*=\s*["\x27][^"\x27]{8,}["\x27]'
    comment: Possible hardcoded secret in config

id: RB_HARDCODED_SECRET
name: Hardcoded Secret
description: Detects hardcoded passwords, tokens, API keys in Ruby
severity: SEVERE
category: security
languages:
  - ruby
suggestion: Use environment variables or a secrets manager
patterns:
  - type: regex
    pattern: '(?i)(password|token|api_key|secret|apiKey|secretKey)\s*[=:]\s*["\x27"][^"\x27]{8,}["\x27]'
    comment: Possible hardcoded secret
  - type: regex
    pattern: 'ENV\s*\[\s*["\x27][^"\x27]+["\x27]\s*\]'
    comment: Environment variable access (check if properly managed)

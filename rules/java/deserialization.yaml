id: JAVA_DESERIALIZATION
name: Insecure Deserialization
description: Detects use of ObjectInputStream or other insecure deserialization that could allow remote code execution
severity: SEVERE
category: security
languages:
  - java
suggestion: Use secure serialization libraries or validate input thoroughly before deserialization
patterns:
  - type: regex
    pattern: 'new\s+ObjectInputStream\s*\('
    comment: Insecure deserialization - ObjectInputStream can execute arbitrary code
  - type: regex
    pattern: 'XMLDecoder\s*\('
    comment: Insecure deserialization via XMLDecoder
  - type: regex
    pattern: 'XStream\s*\(\s*new\s+HierarchicalStreamDriver'
    comment: Insecure XStream deserialization - use safe converter
  - type: regex
    pattern: 'readObject\s*\(\s*\)'
    comment: Dangerous readObject call - ensure input validation
  - type: regex
    pattern: 'readResolve\s*\(\s*\)'
    comment: readResolve method - ensure proper serialization validation
  - type: regex
    pattern: 'ObjectMapper\.readValue\s*\([^,]+,\s*Object\.class\)'
    comment: Polymorphic deserialization - enable type checking

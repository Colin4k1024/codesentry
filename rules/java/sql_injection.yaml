id: JAVA_SQL_INJECTION
name: SQL Injection
description: Detects string concatenation in SQL queries in Java
severity: SEVERE
category: security
languages:
  - java
suggestion: Use parameterized queries (PreparedStatement)
patterns:
  - type: regex
    pattern: '(?i)(Statement|createStatement|executeQuery|executeUpdate)\s*\([^)]*(\+|\.append\()[^)]*\)'
    comment: String concatenation in SQL query - use PreparedStatement
  - type: regex
    pattern: '(?i)String\s+\w+\s*=\s*"[^(]*SELECT[^"]*"\s*\+'
    comment: SQL string concatenated with variable - potential injection
